trust_level_flair_position:
  default: "bottom-left"
  type: enum
  choices:
    - "bottom-right"
    - "top-right"
    - "top-left"
    - "overlap"

group_flair_always_on_top:
  default: true
  type: bool
  description: "For positions where the trust flair overlaps, or is in the same position as group flair."

use_font_awesome:
  default: false
  type: bool
  description: 'Enable this only when the fields below contain Font Awesome values such as "fa-crown". Leave disabled for Emoji or image URLs.'

font_awsome_color:
  default: "#ffffff"
  type: string

font_awsome_background_color:
  default: "#000000"
  type: string

new_user_flair_icon:
  default: "🌱"
  type: string
  description: "TL0: Emoji, image URL, or Font Awesome class."

basic_user_flair_icon:
  default: "⚔️"
  type: string
  description: "TL1: Emoji, image URL, or Font Awesome class."

member_flair_icon:
  default: "🏅"
  type: string
  description: "TL2: Emoji, image URL, or Font Awesome class."

regular_flair_icon:
  default: "💎"
  type: string
  description: "TL3: Emoji, image URL, or Font Awesome class."

leader_flair_icon:
  default: "👑"
  type: string
  description: "TL4: Emoji, image URL, or Font Awesome class."

exclude_nonhuman_users:
  default: true
  type: bool
  description: "Flair will not be displayed on system, discobot, and other bot users."
