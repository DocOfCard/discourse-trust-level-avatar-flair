badge_style:
  default: "metal-shield"
  type: enum
  choices:
    - "metal-shield"
    - "bare"
  description: >-
    <div style="margin:10px 0 14px;max-width:760px"><strong>TL0–TL4 图标预览</strong><img src="data:image/svg+xml;base64," alt="TL0 到 TL4 图标预览：小草、单剑、双剑、战旗、皇冠" style="display:block;width:100%;height:auto;margin-top:8px;border-radius:8px" /></div><div>Metal shield 使用机甲盾徽；Bare 仅显示配置的 Emoji。</div>

trust_level_flair_position:
  default: "bottom-left"
  type: enum
  choices:
    - "bottom-right"
    - "top-right"
    - "top-left"
    - "overlap"

group_flair_always_on_top:
  default: true
  type: bool
  description: "For positions where the trust flair overlaps, or is in the same position as group flair."

use_font_awesome:
  default: false
  type: bool
  description: 'Enable this only when the fields below contain Font Awesome values such as "fa-crown". Leave disabled for Emoji or image URLs.'

font_awsome_color:
  default: "#ffffff"
  type: string

font_awsome_background_color:
  default: "#000000"
  type: string

new_user_flair_icon:
  default: "🌱"
  type: string
  description: "TL0: Emoji, image URL, or Font Awesome class."

basic_user_flair_icon:
  default: "⚔️"
  type: string
  description: "TL1: Emoji, image URL, or Font Awesome class."

member_flair_icon:
  default: "🏅"
  type: string
  description: "TL2: Emoji, image URL, or Font Awesome class."

regular_flair_icon:
  default: "💎"
  type: string
  description: "TL3: Emoji, image URL, or Font Awesome class."

leader_flair_icon:
  default: "👑"
  type: string
  description: "TL4: Emoji, image URL, or Font Awesome class."

exclude_nonhuman_users:
  default: true
  type: bool
  description: "Flair will not be displayed on system, discobot, and other bot users."
