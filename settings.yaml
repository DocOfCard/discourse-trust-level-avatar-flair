badge_style:
  default: "custom-svg"
  type: enum
  choices:
    - "custom-svg"
    - "bare"
  description: "Custom SVG uses the five built-in badge assets. Bare displays the configured Emoji or Font Awesome icon without the badge."

trust_level_flair_position:
  default: "bottom-left"
  type: enum
  choices:
    - "bottom-right"
    - "top-right"
    - "top-left"
    - "overlap"

group_flair_always_on_top:
  default: true
  type: bool

use_font_awesome:
  default: false
  type: bool

new_user_flair_icon:
  default: "🌱"
  type: string
basic_user_flair_icon:
  default: "🗡️"
  type: string
member_flair_icon:
  default: "⚔️"
  type: string
regular_flair_icon:
  default: "👑"
  type: string
leader_flair_icon:
  default: "⚜️"
  type: string

exclude_nonhuman_users:
  default: true
  type: bool
